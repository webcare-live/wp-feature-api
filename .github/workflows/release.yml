# Triggers when a release is published in the GitHub UI
name: Build and Upload Release Asset

on:
  release:
    types: [published] # Trigger when a release is published

jobs:
  build-and-upload:
    name: Build and Upload Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout the specific tag associated with the release
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }} # Get upload URL from the release event
          asset_path: ./wp-feature-api.zip
          asset_name: wp-feature-api.zip # You can customize this if needed, e.g. include version
          asset_content_type: application/zip
